<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Shield Icon -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0038B8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#0052FF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Shield Background -->
  <path d="M24,10 L76,10 L76,48 C76,78 50,98 50,98 C50,98 24,78 24,48 Z" fill="url(#blueGrad)" filter="url(#shadow)" rx="4"/>

  <!-- Circuit Nodes -->
  <line x1="50" y1="30" x2="50" y2="72" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="38" x2="66" y2="38" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="56" x2="62" y2="56" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="34" y2="38" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="66" y2="38" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="38" y2="56" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="62" y2="56" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nodes (Rings) -->
  <circle cx="50" cy="30" r="4.5" fill="#FFFFFF"/>
  <circle cx="50" cy="72" r="4.5" fill="#FFFFFF"/>
  <circle cx="34" cy="38" r="4.5" fill="#FFFFFF"/>
  <circle cx="66" cy="38" r="4.5" fill="#FFFFFF"/>
  <circle cx="38" cy="56" r="4.5" fill="#FFFFFF"/>
  <circle cx="62" cy="56" r="4.5" fill="#FFFFFF"/>

  <!-- Text -->
  <text x="100" y="72" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#0A0B0D">agentsafe</text>
  <text x="100" y="94" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#64748B" letter-spacing="2">AI AGENT SAFETY ON BASE</text>
</svg>
