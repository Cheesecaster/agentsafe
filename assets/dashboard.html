<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agentsafe — Agent Wallet Dashboard</title>
    <style>
        :root {
            --blue: #0052FF;
            --white: #FFFFFF;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-800: #1F2937;
            --red: #DC2626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            min-height: 100vh;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--blue); }
        .card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card h2 { font-size: 0.875rem; color: #6B7280; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .card .value { font-size: 1.5rem; font-weight: 700; }
        .value.big { font-size: 2rem; }
        #wallet-section { margin-bottom: 2rem; }
        button {
            background: var(--blue);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button.danger { background: var(--red); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status.active { background: #D1FAE5; color: #065F46; }
        .status.inactive { background: #FEE2E2; color: #991B1B; }
        #kill-btn { margin-top: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .mono { font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 0.8rem; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>agentsafe Dashboard</h1>

        <div id="wallet-section" class="card">
            <h2>Authentication</h2>

            <!-- API Key login (primary for daily use) -->
            <div style="margin-bottom: 1rem;">
                <p style="font-size: 0.8rem; color: #6B7280; margin-bottom: 0.5rem;">Enter your agentsafe API key (no wallet needed)</p>
                <div style="display: flex; gap: 0.5rem;">
                    <input id="api-key-input" type="password" placeholder="ask_..." style="flex:1; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: 8px; font-family: ui-monospace, monospace; font-size: 0.85rem;">
                    <button onclick="loginApiKey()">Login</button>
                </div>
            </div>

            <!-- Wallet login (one-time setup) -->
            <div style="border-top: 1px solid var(--gray-200); padding-top: 1rem;">
                <p style="font-size: 0.8rem; color: #6B7280; margin-bottom: 0.5rem;">Or connect wallet (SiWE)</p>
                <button id="connect-btn" onclick="connectWallet()" style="background: var(--gray-100); color: var(--gray-800);">Connect Wallet</button>
            </div>

            <div id="wallet-info" style="margin-top: 1rem; display: none;">
                <p class="mono" id="wallet-addr"></p>
                <p>USDC: <span id="usdc-balance" class="value">—</span> USDC</p>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Budget Remaining</h2>
                <div id="budget-val" class="value big">$20.00</div>
                <div style="margin-top: 0.5rem;">
                    <span id="session-status" class="status inactive">INACTIVE</span>
                </div>
            </div>
            <div class="card">
                <h2>Merkle Root</h2>
                <div id="merkle-root" class="mono">—</div>
                <div id="session-id" class="mono" style="margin-top: 4px; font-size: 0.75rem; color: #6B7280;"></div>
            </div>
        </div>

        <div class="card">
            <h2>Audit Log</h2>
            <pre id="audit-log" class="mono" style="max-height: 200px; overflow-y: auto; font-size: 0.75rem;">Waiting for session...</pre>
        </div>

        <button id="kill-btn" class="danger" onclick="killSwitch()" disabled>🛑 Kill Switch</button>
    </div>

    <script>
        const USDC_ABI = [
            { "inputs": [{"name": "account", "type": "address"}], "name": "balanceOf", "outputs": [{"type": "uint256"}], "stateMutability": "view", "type": "function" }
        ];
        const USDC_ADDRESS = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
        const API_BASE = window.location.origin;
        let account = null;

        async function loginApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) { alert("Enter an API key"); return; }
            localStorage.setItem('agentsafe_api_key', key);
            loadStatus();
        }

        async function connectWallet() {
            if (!window.ethereum) {
                alert("No wallet detected. Install MetaMask or Coinbase Wallet.");
                return;
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                document.getElementById('connect-btn').style.display = 'none';
                document.getElementById('wallet-info').style.display = 'block';
                document.getElementById('wallet-addr').textContent = account;

                // Get nonce for SiWE
                const nonceRes = await fetch(`${API_BASE}/auth/nonce`);
                const { nonce, domain } = await nonceRes.json();
                const message = `agentsafe.io wants you to sign in with your Ethereum account:\n${account}\n\nSign in to agentsafe\n\nURI: ${window.location.origin}\nVersion: 1\nChain ID: 8453\nNonce: ${nonce}\n`;

                const signature = await window.ethereum.request({
                    method: 'personal_sign',
                    params: [account, message]
                });

                const signRes = await fetch(`${API_BASE}/auth/sign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: account, signature, nonce, message })
                });
                const auth = await signRes.json();
                localStorage.setItem('agentsafe_jwt', auth.token);

                loadStatus();
            } catch (err) {
                console.error(err);
                alert("Connection failed: " + err.message);
            }
        }

        async function loadStatus() {
            const apiKey = localStorage.getItem('agentsafe_api_key');
            const token = localStorage.getItem('agentsafe_jwt');
            let authHeader = {};
            if (apiKey) {
                authHeader['Authorization'] = `Api-Key ${apiKey}`;
            } else if (token) {
                authHeader['Authorization'] = `Bearer ${token}`;
            }
            const res = await fetch(`${API_BASE}/v1/status`, { headers: authHeader });
            const data = await res.json();
            document.getElementById('budget-val').textContent = '$' + data.budget_remaining?.toFixed(2) || '0.00';
            document.getElementById('merkle-root').textContent = data.merkle_root || '—';
            document.getElementById('session-id').textContent = data.session_id || '';
            const statusEl = document.getElementById('session-status');
            if (data.status === 'ACTIVE') {
                statusEl.className = 'status active';
                statusEl.textContent = 'ACTIVE';
                document.getElementById('kill-btn').disabled = false;
            } else {
                statusEl.className = 'status inactive';
                statusEl.textContent = 'INACTIVE';
                document.getElementById('kill-btn').disabled = true;
            }

            // Load audit
            const auditRes = await fetch(`${API_BASE}/v1/audit`);
            const audit = await auditRes.json();
            document.getElementById('audit-log').textContent = JSON.stringify(audit.recent_logs || [], null, 2);
        }

        async function killSwitch() {
            if (!confirm('Are you sure? This will kill the agent session.')) return;
            const apiKey = localStorage.getItem('agentsafe_api_key');
            const token = localStorage.getItem('agentsafe_jwt');
            let authHeader = {};
            if (apiKey) {
                authHeader['Authorization'] = `Api-Key ${apiKey}`;
            } else if (token) {
                authHeader['Authorization'] = `Bearer ${token}`;
            }
            await fetch(`${API_BASE}/v1/kill`, { method: 'POST', headers: authHeader });
            loadStatus();
        }

        // Auto-refresh every 5s
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
