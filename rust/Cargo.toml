# `agentsafe-rs`

> Zero-cost safety for agents that spend.
> Rust core for `agentsafe` — production-grade, compiled safety engine.

## Workspace Structure

- `agentsafe-core`: Core safety logic (Budget, Trust, Anomaly, TimeLock, Behavior, Audit).
- `agentsafe-x402`: x402 protocol implementation (client + server middleware).
- `agentsafe-wallet`: Base smart account and session key management.
- `agentsafe-cli`: High-performance CLI dashboard.

## Build

```bash
cargo build --release
```

## Features

- **Zero-Cost Guard Checks**: All 6 guards run in <100ns.
- **Concurrency**: Async-ready with `tokio`.
- **Memory Safe**: No GC, deterministic allocation.
- **FFI Ready**: Bindings for Python (PyO3) and JS (N-API) planned.
